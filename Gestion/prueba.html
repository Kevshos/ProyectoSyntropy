<!DOCTYPE html>
<html>
<body>

<h2>Clientes</h2>

<h3>Lista Clientes</h3>
<ul id="lista"></ul>

<script>

async function cargarPantalla() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    try {
        const res = await fetch('/Proyecto/ProyectoSyntropy/miApi/Camiones');
        
        // 1. En lugar de .json(), lo leemos como texto puro
        const textoCrudo = await res.text(); 
        
        // 2. Lo imprimimos en la consola para ver qué mandó PHP realmente
        console.log("RESPUESTA DEL SERVIDOR:", textoCrudo);

        // 3. Ahora sí intentamos convertirlo a JSON
        const data = JSON.parse(textoCrudo);

        data.forEach(c => {
            const li = document.createElement("li");
            li.innerHTML = c.Nombre;
            lista.appendChild(li);
        });
    } catch (error) {
        console.error("Hubo un error:", error);
    }
}

cargarPantalla();

</script>
</body>
</html>
