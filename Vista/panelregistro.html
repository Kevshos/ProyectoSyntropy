<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Registro - Epsilon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<script>
    if (localStorage.getItem("logueado") !== "si") {
        window.location.href = "login.html";
    }
</script>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="logo.png" alt="Epsilon">
        </a>
    </div>

    <div class="header-actions">
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </div>

    <nav id="menu">
        <ul>
            <li><button class="link-button" onclick="window.location.href='gestion.html'">Gestión</button></li>
            <li><button class="link-button" onclick="window.location.href='panelregistro.html'">Panel Registro</button></li>
            <li><button class="link-button" onclick="window.location.href='panelcontenedor.html'">Contenedores</button></li>
            <li><button class="link-button" onclick="window.location.href='panelcamion.html'">Camiones</button></li>
        </ul>
    </nav>
</header>

<div class="pagina">
    <h2>Panel Registro</h2>
    <p>Administración de usuarios pendientes de confirmación.</p>

    <div class="lista-panel">
        <h3>Usuarios pendientes</h3>
        <div id="listaUsuarios">
            <p>Cargando usuarios...</p>
        </div>
    </div>
</div>

<script>
    // ---- Menú hamburguesa ----
    function toggleMenu() {
        document.getElementById("menu").classList.toggle("activo");
    }

    // ---- Lógica de usuarios pendientes ----
    const API_URL = "http://localhost/Proyecto/ProyectoSyntropy/Usuarios/miApi/";
    let usuarios = [];

    const listaContainer = document.getElementById("listaUsuarios");

    async function obtenerUsuarios() {
        try {
            const resp = await fetch(`${API_URL}ListarPendientes`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            usuarios = Array.isArray(data) ? data : data?.usuarios || [];
            renderizarLista();
        } catch (error) {
            console.error("Error al obtener usuarios:", error);
            listaContainer.innerHTML = `<p>Error al cargar usuarios.</p>`;
        }
    }

    async function enviarAccion(mail, decision) {
        try {
            const resp = await fetch(`${API_URL}Actualizar`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mail, decision }),
            });

            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const resultado = await resp.json();

            if (resultado?.status === "success") {
                const usuario = usuarios.find((u) => u.mail === mail);
                if (usuario) {
                    usuario.estado = decision === "Aceptado" ? "Aceptado" : "Rechazado";
                }
                renderizarLista();
            } else {
                alert(`No se pudo ${decision} el usuario.`);
            }
        } catch (error) {
            console.error(error);
            alert(`Error de conexión al ${decision} usuario.`);
        }
    }

    function renderizarLista() {
        const pendientes = usuarios.filter((u) => u.estado === "Pendiente");

        if (pendientes.length === 0) {
            listaContainer.innerHTML = `
                <p>No hay usuarios pendientes.</p>
                <p>Todos han sido procesados.</p>`;
            return;
        }

        let html = '<ul style="list-style: none; padding: 0; margin: 0;">';
        pendientes.forEach((usuario) => {
            html += `
                <li style="display: flex; align-items: center; justify-content: space-between; padding: 14px 20px;">
                    <span><strong>${usuario.nombre}</strong></span>
                    <span style="display: flex; gap: 10px;">
                        <button style="padding: 10px 18px; border: none; border-radius: 6px; color: #fff; font-size: 0.95rem; cursor: pointer; background-color: #27ae60;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1" onclick="aceptarUsuario('${usuario.mail}')">Aceptar</button>
                        <button style="padding: 10px 18px; border: none; border-radius: 6px; color: #fff; font-size: 0.95rem; cursor: pointer; background-color: #c0392b;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1" onclick="rechazarUsuario('${usuario.mail}')">Rechazar</button>
                    </span>
                </li>`;
        });
        html += "</ul>";
        listaContainer.innerHTML = html;
    }

    window.aceptarUsuario = (mail) => enviarAccion(mail, "Aceptado");
    window.rechazarUsuario = (mail) => enviarAccion(mail, "Rechazado");

    obtenerUsuarios();
</script>

</body>
</html>
