<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epsilon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">
        <a href="index.html">
            <img src="logo.png" alt="Epsilon">
        </a>
    </div>


    <div class="header-actions">

        <div id="registro-btn">
            <button onclick="window.location.href='registro.html'">
                Registrar
            </button>
        </div>


        <div id="usuario" class="usuario">

        </div>


        <div class="menu-toggle" onclick="toggleMenu()">
            ☰
        </div>

    </div>


    <nav id="menu">

        <ul>

            <li>
                <button class="link-button" onclick="verificarAcceso('gestion.html')">
                    Gestión
                </button>
            </li>

            <li>
                <button class="link-button" onclick="verificarAcceso('rutas.html')">
                    Rutas
                </button>
            </li>

            <li>
                <button class="link-button" onclick="verificarAcceso('mapa.html')">
                    Mapa
                </button>
            </li>

            <li>
                <button class="link-button" onclick="verificarAcceso('estadisticas.html')">
                    Estadísticas
                </button>
            </li>

            <li>
                <button class="link-button" onclick="verificarAcceso('documentacion.html')">
                    Documentación
                </button>
            </li>

        </ul>

    </nav>

</header>



<section class="contenido">

    <div class="texto">

        <h4>EPSILON</h4>

        <h2>
            Transformando <br>
            la Gestión <br>
            Urbana
        </h2>

        <p>
            Plataforma integral para el monitoreo,
            recolección y optimización de residuos
            en tiempo real.
        </p>


        <div class="botones">

            <button onclick="verificarAcceso('mapa.html')">
                Explorar Mapa
            </button>


            <button onclick="verificarAcceso('documentacion.html')">
                Documentación
            </button>

        </div>


    </div>


    <div class="imagen">

        <img src="fotocamion.png" alt="Camión">

    </div>


</section>




<script>


function toggleMenu(){

    document
    .getElementById("menu")
    .classList.toggle("activo");

}



function verificarAcceso(destino){

    if(localStorage.getItem("logueado") === "si"){

        window.location.href = destino;

    }else{

        window.location.href = "login.html";

    }

}




function cerrarSesion(){

    localStorage.removeItem("logueado");

    location.reload();

}





function cargarUsuario(){


    const usuario =
    document.getElementById("usuario");


    const registro =
    document.getElementById("registro-btn");



    if(localStorage.getItem("logueado") === "si"){


        registro.style.display = "none";


        usuario.innerHTML = `

        <button class="usuario-btn" onclick="abrirUsuario()">
            👤
        </button>

        <div id="menuUsuario" class="menu-usuario">

            <button onclick="cerrarSesion()">
                Cerrar Sesión
            </button>

        </div>

        `;


    }


}



function abrirUsuario(){

    document
    .getElementById("menuUsuario")
    .classList.toggle("activo");

}



cargarUsuario();


</script>


</body>

</html>
