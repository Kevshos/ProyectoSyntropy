<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios pendientes</title>
  </head>
  <body>
    <div id="app">
      <h1>Usuarios pendientes</h1>
      <div id="listaUsuarios"></div>
      <button id="restaurarBtn">Restaurar todos</button>
    </div>

    <script>
      const API_URL = "api_usuarios.php"; // ← tu endpoint PHP

      let usuarios = [];
      const listaContainer = document.getElementById("listaUsuarios");
      const restaurarBtn = document.getElementById("restaurarBtn");
      async function obtenerUsuarios() {
        try {
          const resp = await fetch(API_URL);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          // Se asume que data es un array de usuarios
          // (o un objeto con una propiedad 'usuarios', ajusta según tu API)
          if (Array.isArray(data)) {
            usuarios = data;
          } else if (data && Array.isArray(data.usuarios)) {
            usuarios = data.usuarios;
          } else {
            // Si no viene como esperamos, inicializamos vacío
            usuarios = [];
          }
          renderizarLista();
        } catch (error) {
          console.error("Error al obtener usuarios:", error);
          // Mostrar mensaje de error en el DOM
          listaContainer.innerHTML = `<p style="color: #b33;">⚠️ Error al cargar usuarios. Revisa la consola.</p>`;
        }
      }

      /**
       * Envía una acción (aceptar/rechazar) para un usuario.
       * @param {number} id - ID del usuario
       * @param {string} accion - 'aceptar' o 'rechazar'
       */
      async function enviarAccion(id, accion) {
        try {
          const formData = new FormData();
          formData.append("id", id);
          formData.append("accion", accion);

          const resp = await fetch(API_URL, {
            method: "POST",
            body: formData,
          });

          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

          const resultado = await resp.json();
          // Se espera un objeto con { success: true, ... } o similar
          if (resultado && resultado.success === true) {
            // Actualizar el estado local: marcar como no pendiente
            const usuario = usuarios.find((u) => u.id === id);
            if (usuario) {
              usuario.estado = accion === "aceptar" ? "aceptado" : "rechazado";
            }
            renderizarLista();
          } else {
            // Si el backend devuelve success:false o mensaje de error
            console.warn("Acción no exitosa:", resultado);
            // Opcional: mostrar un mensaje al usuario
            alert(`No se pudo ${accion} el usuario.`);
          }
        } catch (error) {
          console.error(`Error al ${accion} usuario ${id}:`, error);
          alert(`Error de conexión al ${accion} usuario.`);
        }
      }

      /**
       * Restaura todos los usuarios a estado 'pendiente' (o reinicia el listado).
       * Puede ser un endpoint específico o reutilizar la misma API.
       */
      async function restaurarTodos() {
        try {
          // Opción 1: llamar a un endpoint específico de restauración
          // const resp = await fetch(API_URL + '?accion=restaurar', { method: 'POST' });

          // Opción 2: si tu backend no tiene restauración, recargamos desde el servidor
          // y forzamos que todos estén pendientes (depende de tu lógica)
          // En este ejemplo, asumimos que hay un endpoint que devuelve todos los usuarios
          // en estado pendiente de nuevo.

          // Vamos a usar el mismo endpoint pero con un parámetro especial
          const formData = new FormData();
          formData.append("accion_global", "restaurar");

          const resp = await fetch(API_URL, {
            method: "POST",
            body: formData,
          });

          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

          const resultado = await resp.json();
          if (resultado && resultado.success === true) {
            // Si el backend devuelve la lista restaurada
            if (Array.isArray(resultado.usuarios)) {
              usuarios = resultado.usuarios;
            } else {
              // Si no, recargamos desde el servidor
              await obtenerUsuarios();
              return;
            }
            renderizarLista();
          } else {
            // Si no hay restauración en el backend, recargamos
            await obtenerUsuarios();
          }
        } catch (error) {
          console.error("Error al restaurar:", error);
          // Fallback: recargar la lista
          await obtenerUsuarios();
        }
      }

      // ============================================================
      //  RENDERIZADO (SIN CSS, SOLO HTML PLANO)
      // ============================================================

      function renderizarLista() {
        // Filtrar solo pendientes
        const pendientes = usuarios.filter((u) => u.estado === "pendiente");

        if (pendientes.length === 0) {
          listaContainer.innerHTML = `
                    <p>✅ No hay usuarios pendientes.</p>
                    <p><small>Todos han sido procesados.</small></p>
                `;
          return;
        }

        let html = '<ul style="list-style: none; padding: 0;">';

        pendientes.forEach((usuario) => {
          const nombreSeguro = escapeHTML(usuario.nombre);
          html += `
                    <li style="margin: 0.5rem 0; padding: 0.5rem; border: 1px solid #ccc; display: flex; align-items: center; justify-content: space-between; max-width: 500px;">
                        <span><strong>${nombreSeguro}</strong> (pendiente)</span>
                        <span>
                            <button onclick="aceptarUsuario(${usuario.id})" style="margin-right: 0.3rem;">✔ Aceptar</button>
                            <button onclick="rechazarUsuario(${usuario.id})">✖ Rechazar</button>
                        </span>
                    </li>
                `;
        });

        html += "</ul>";
        listaContainer.innerHTML = html;
      }

      // Función de escape básica para prevenir XSS
      function escapeHTML(texto) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return texto.replace(/[&<>"']/g, function (m) {
          return map[m];
        });
      }

      // ============================================================
      //  FUNCIONES GLOBALES (para onclick en los botones)
      // ============================================================

      // Las declaramos como funciones globales para que los onclick las encuentren
      window.aceptarUsuario = function (id) {
        enviarAccion(id, "aceptar");
      };

      window.rechazarUsuario = function (id) {
        enviarAccion(id, "rechazar");
      };

      // ============================================================
      //  EVENTO RESTAURAR
      // ============================================================

      restaurarBtn.addEventListener("click", function () {
        restaurarTodos();
      });

      // ============================================================
      //  INICIO: CARGAR USUARIOS AL ARRANCAR
      // ============================================================

      obtenerUsuarios();

      //  EJEMPLO DE ESTRUCTURA PARA PHP (api_usuarios.php)
      //  (comentado para referencia)

    </script>
