<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panel Contenedores - Epsilon</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<script>

if(localStorage.getItem("logueado") !== "si"){

    window.location.href = "login.html";

}

</script>



<header>


    <div class="logo">

        <a href="index.html">

            <img src="logo.png" alt="Epsilon">

        </a>

    </div>




    <div class="header-actions">


        <div class="menu-toggle" onclick="toggleMenu()">

            ☰

        </div>


    </div>




    <nav id="menu">


        <ul>


            <li>

                <button class="link-button"
                onclick="window.location.href='gestion.html'">

                    Gestión

                </button>

            </li>



            <li>

                <button class="link-button"
                onclick="window.location.href='panelregistro.html'">

                    Panel Registro

                </button>

            </li>



            <li>

                <button class="link-button"
                onclick="window.location.href='panelcontenedor.html'">

                    Contenedores

                </button>

            </li>



            <li>

                <button class="link-button"
                onclick="window.location.href='panelcamion.html'">

                    Camiones

                </button>

            </li>



        </ul>


    </nav>


</header>





<div class="pagina">



    <h2>

        Panel Contenedores

    </h2>



    <p>

        Gestión de contenedores registrados en el sistema.

    </p>





    <div class="panel">


        <button>

            Crear Contenedor

        </button>



        <button>

            Modificar Contenedor

        </button>



        <button>

            Eliminar Contenedor

        </button>


    </div>





    <div class="lista-panel">


        <h3>

            Lista de Contenedores

        </h3>



        <ul>


            <li>

                Contenedor #001 - Centro - Activo

            </li>



            <li>

                Contenedor #002 - Buceo - Lleno

            </li>



            <li>

                Contenedor #003 - Pocitos - Disponible

            </li>



        </ul>



    </div>




</div>






<script>


function toggleMenu(){

    document
    .getElementById("menu")
    .classList.toggle("activo");

}



</script>




</body>

</html>
