<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Epsilon</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="login-container">
      <div style="text-align: center; margin-bottom: 25px">
        <a href="index.html">
          <img src="logo.png" alt="Epsilon" style="height: 90px" />
        </a>
      </div>

      <form id="loginForm">
        <input type="text" name="mail" id="mail" placeholder="Mail" required />

        <input
          type="password"
          name="contrasenia"
          id="password"
          placeholder="Contraseña"
          required
        />

        <input type="submit" value="Ingresar" />
      </form>

      <div class="login-links">
        <a href="recuperar.html"> ¿Olvidaste tu contraseña? </a>

        <a href="registro.html"> Crear Cuenta </a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData.entries());

          try {
            const response = await fetch(
              "http://localhost/Proyecto/ProyectoSyntropy/Usuarios/miApi/Login",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(data),
              },
            );

            const result = await response.json();
            if (response.ok) {
              alert(
                "¡Solicitud de Login enviada con exito!" +
                  (result.mensaje || ""),
              );
              (localStorage.setItem("logueado", "si"),
                (window.location.href = "index.html"));
            } else {
              alert(`Error: ${result.mensaje || "No se pudo Loguear"}`);
            }
          } catch (error) {
            console.error("Detalle exacto del error:", error);
            alert("Error de conexión: " + error.message);
          }
        });
    </script>
  </body>
</html>
