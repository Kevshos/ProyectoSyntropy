<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Epsilon</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="login-container">
      <div style="text-align: center; margin-bottom: 25px">
        <a href="index.html">
          <img src="logo.png" alt="Epsilon" style="height: 90px" />
        </a>
      </div>

      <form id="registerForm">
        <input type="text" name="nombre" placeholder="Nombre" required />
        <input type="text" name="apellido" placeholder="Apellido" required />
        <input
          type="email"
          name="mail"
          placeholder="Correo Electrónico"
          required
        />

        <input type="text" name="usuario" placeholder="Usuario" required />

        <input
          type="password"
          name="contrasenia"
          placeholder="Contraseña"
          required
        />
        <input type="password" placeholder="Confirmar Contraseña" required />

        <input type="submit" value="Registrarse" />
      </form>

      <div class="login-links">
        <a href="login.html"> Ya tengo una cuenta </a>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")

        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData.entries());

          try {
            const response = await fetch(
              "http://localhost/Proyecto/ProyectoSyntropy/Usuarios/miApi/Registrar",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(data),
              },
            );

            const result = await response.json();
            if (response.ok) {
              alert(
                "¡Solicitud de registro enviada con exito!" +
                  (result.mensaje || ""),
              );
              window.location.href = "login.html";
            } else {
              alert(`Error: ${result.error || "No se pudo registrar"}`);
            }
          } catch (error) {
            console.error("Error de conexion:", error);
            alert("Error al conectar con el servidor");
          }
        });
    </script>
  </body>
</html>
