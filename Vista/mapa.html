<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa - Epsilon</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>

  <body>
    <script>
      if (localStorage.getItem("logueado") !== "si") {
        window.location.href = "login.html";
      }
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <header>
      <div class="logo">
        <a href="index.html">
          <img src="logo.png" alt="Epsilon" />
        </a>
      </div>

      <div class="menu-toggle" onclick="toggleMenu()">☰</div>

      <nav id="menu">
        <ul>
          <li>
            <button
              class="link-button"
              onclick="window.location.href = 'gestion.html'"
            >
              Gestión
            </button>
          </li>

          <li>
            <button
              class="link-button"
              onclick="window.location.href = 'rutas.html'"
            >
              Rutas
            </button>
          </li>

          <li>
            <button
              class="link-button"
              onclick="window.location.href = 'mapa.html'"
            >
              Mapa
            </button>
          </li>

          <li>
            <button
              class="link-button"
              onclick="window.location.href = 'estadisticas.html'"
            >
              Estadísticas
            </button>
          </li>

          <li>
            <button
              class="link-button"
              onclick="window.location.href = 'documentacion.html'"
            >
              Documentación
            </button>
          </li>

          <li id="sesion"></li>
        </ul>
      </nav>
    </header>

    <div class="pagina">
      <h2>Mapa de Contenedores</h2>

      <p>Visualización geográfica de la ciudad.</p>

      <div class="panel">
        <button>Ver Contenedores</button>
        <button>Ver Camiones</button>
        <button>Actualizar Mapa</button>
      </div>

      <div id="map"></div>
    </div>

    <script>
      function toggleMenu() {
        document.getElementById("menu").classList.toggle("activo");
      }

      function cerrarSesion() {
        localStorage.removeItem("logueado");
        window.location.href = "index.html";
      }

      const sesion = document.getElementById("sesion");
      sesion.innerHTML = `<button onclick="cerrarSesion()">Cerrar Sesión</button>`;

      var map = L.map("map").setView([-34.9011, -56.1645], 13);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
        {
          attribution: "&copy; OpenStreetMap &copy; CARTO",
        },
      ).addTo(map);

      var marcadorCentro = L.marker([-34.894555, -56.124376]).addTo(map);
      marcadorCentro.bindPopup(
        "<b>Buceo</b><br>Contenedor de la casa de emilia.",
      );

      var estadio = L.marker([-34.8944, -56.1528]).addTo(map);
      estadio.bindPopup(
        "<b>Estadio Centenario</b><br>Punto de reciclaje de envases plásticos.",
      );

      var letrasMvd = L.marker([-34.9066, -56.1469]).addTo(map);
      letrasMvd.bindPopup(
        "<b>Letras de Montevideo</b><br>Contenedor inteligente de vidrio.",
      );
    </script>
  </body>
</html>
